name: Supabase Keep-Alive

# Pings the Supabase project every 3 days so the free-tier project
# is never paused (free projects pause after 7 days of inactivity).
on:
  schedule:
    - cron: '0 6 */3 * *' # every 3 days at 06:00 UTC
  workflow_dispatch: {} # allow manual runs

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase keep_alive_ping RPC
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::Missing SUPABASE_URL or SUPABASE_ANON_KEY repository secrets."
            exit 1
          fi
          STATUS=$(curl -s -o /tmp/resp.txt -w "%{http_code}" \
            -X POST "$SUPABASE_URL/rest/v1/rpc/keep_alive_ping" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "HTTP $STATUS — response: $(cat /tmp/resp.txt)"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Keep-alive ping failed with HTTP $STATUS"
            exit 1
          fi
